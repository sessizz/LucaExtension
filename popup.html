<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { width: 360px; padding: 14px; font-family: Arial, sans-serif; color: #17202a; }
    h3 { margin: 0 0 10px; font-size: 16px; }
    h4 { margin: 18px 0 8px; font-size: 14px; }
    label { display: block; margin: 8px 0 4px; font-size: 12px; font-weight: 700; color: #34495e; }
    input { width: 100%; margin-bottom: 8px; padding: 7px; border: 1px solid #cfd8dc; border-radius: 4px; }
    button { padding: 8px; cursor: pointer; border: 0; border-radius: 4px; background: #1f6feb; color: white; font-weight: 700; }
    button.secondary { background: #607d8b; }
    button.danger { background: #d93025; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .full { width: 100%; }
    #status { min-height: 16px; margin-top: 10px; color: #137333; font-size: 12px; }
    #companyList { margin-top: 8px; font-size: 12px; color: #455a64; }
    .company-item { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #eceff1; }
    .company-item button { width: auto; padding: 5px 8px; font-size: 11px; }
  </style>
</head>
<body>
  <h3>OpenRouter Ayarlari</h3>
  <label for="apiKey">API Anahtariniz:</label>
  <input type="password" id="apiKey" placeholder="sk-or-v1-...">
  <button id="saveBtn" class="full">API Anahtarini Kaydet</button>

  <h4>Luca Firma Bilgileri</h4>
  <label for="companyName">Firma Adi</label>
  <input type="text" id="companyName" placeholder="Ornek Firma">

  <label for="memberNo">Uye Numarasi</label>
  <input type="text" id="memberNo" maxlength="10" placeholder="1234567890">

  <label for="username">Kullanici Adi</label>
  <input type="text" id="username" maxlength="25" placeholder="kullanici">

  <label for="password">Parola</label>
  <input type="password" id="password" maxlength="25" placeholder="parola">

  <div class="row">
    <button id="saveCompanyBtn">Firmayi Kaydet</button>
    <button id="clearCompanyBtn" class="secondary">Formu Temizle</button>
  </div>

  <div id="companyList"></div>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
